<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SM OS v6 | Roles Operativos Beta</title>
  <style>
    :root{
      --bg-a:#ffffff;--bg-b:#edf6ff;--bg-c:#cfe3f8;--nav-a:#0b3d91;--nav-b:#123f75;
      --blue:#0b5cab;--blue-dark:#0b2f5b;--blue-soft:#f4f9ff;--line:#aac5e8;--card:#ffffff;
      --muted:#55708f;--danger:#b42318;--danger-bg:#fff5f5;--green:#2e7d32;--green-bg:#e8f5e9;
      --yellow:#9a6700;--yellow-bg:#fff8e1;--red:#c62828;--red-bg:#ffebee;--gray:#475569;--gray-bg:#f1f5f9;
      --purple:#5b21b6;--purple-bg:#f3e8ff;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,var(--bg-a) 0%,var(--bg-b) 34%,var(--bg-c) 100%);color:var(--blue-dark)}
    button,input,textarea,select{font-family:Arial,Helvetica,sans-serif} .page{min-height:100vh;padding:24px}.center{display:grid;place-items:center}
    .card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 45px rgba(11,61,145,.13);padding:24px}.login-card{width:100%;max-width:500px;padding:36px}
    .small{font-size:12px;font-weight:900;letter-spacing:.06em;color:var(--muted);text-transform:uppercase}h1,h2,h3,strong{color:var(--blue-dark)}
    h1{font-size:46px;margin:6px 0;line-height:1.05}h2{font-size:26px;margin:0 0 16px}h3{font-size:19px;margin:0 0 8px}p{line-height:1.45}
    label{display:block;font-size:13px;font-weight:900;color:var(--blue-dark);margin:14px 0 7px} input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:15px;background:#fff;color:var(--blue-dark)}textarea{min-height:90px;resize:vertical}
    .btn{border:0;border-radius:14px;padding:12px 18px;background:linear-gradient(135deg,var(--nav-a),var(--blue));color:#fff;font-weight:900;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn:hover{opacity:.92}.btn[disabled],.btn-secondary[disabled]{opacity:.45;cursor:not-allowed}
    .btn-secondary{border:1px solid var(--line);border-radius:14px;padding:11px 16px;background:var(--blue-soft);color:var(--blue);font-weight:900;cursor:pointer}.btn-danger{border:1px solid #fecaca;border-radius:14px;padding:10px 14px;background:var(--danger-bg);color:#991b1b;font-weight:900;cursor:pointer}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px;border-left:10px solid var(--blue);background:linear-gradient(135deg,#fff 0%,#f4f9ff 100%)}.version{display:inline-flex;border-radius:999px;padding:6px 10px;margin-left:8px;background:#e6f0ff;color:var(--nav-a);font-size:11px;font-weight:900;vertical-align:middle}.role-chip{display:inline-flex;border-radius:999px;padding:7px 10px;background:#e6f0ff;color:var(--nav-a);font-size:12px;font-weight:900;margin-top:6px}
    .layout{display:grid;grid-template-columns:250px 1fr;gap:18px}aside.card{background:linear-gradient(180deg,var(--nav-a) 0%,var(--nav-b) 100%);border-color:var(--nav-a)}.nav button{width:100%;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.11);color:#fff;border-radius:14px;padding:12px;text-align:left;font-weight:900;cursor:pointer;margin-bottom:10px}.nav button:hover{background:rgba(255,255,255,.18)}.nav button.active{background:#fff;color:var(--nav-a);box-shadow:0 10px 24px rgba(0,0,0,.18)}
    .grid{display:grid;gap:16px}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}.stat .num{font-size:34px;font-weight:900;margin-top:8px;color:var(--blue)}.list{display:grid;gap:12px}.item{border:1px solid var(--line);background:#fff;border-radius:18px;padding:16px}.row{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;white-space:nowrap}.green{background:var(--green-bg);color:var(--green)}.yellow{background:var(--yellow-bg);color:var(--yellow)}.red{background:var(--red-bg);color:var(--red)}.gray{background:var(--gray-bg);color:var(--gray)}.purple{background:var(--purple-bg);color:var(--purple)}
    .table{width:100%;border-collapse:separate;border-spacing:0 10px}.table th{text-align:left;color:var(--blue);font-size:12px;padding:0 10px;text-transform:uppercase;letter-spacing:.04em}.table td{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 10px;vertical-align:top}.table td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}
    .kanban{display:grid;grid-template-columns:repeat(4,minmax(230px,1fr));gap:14px;overflow:auto;padding-bottom:4px}.kanban-col{background:#f4f9ff;border:1px solid var(--line);border-radius:18px;padding:14px;min-height:320px}.kanban-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer}
    .modal-bg{position:fixed;inset:0;background:rgba(11,47,91,.45);display:grid;place-items:center;padding:20px;z-index:50}.modal{width:100%;max-width:800px;max-height:90vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 28px 80px rgba(11,47,91,.28);padding:28px}.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}.empty{border:1px dashed var(--line);border-radius:18px;padding:22px;color:var(--muted);background:#fff}.searchbar{display:flex;gap:10px;margin-bottom:14px}.searchbar input{max-width:420px}.notice{background:#f4f9ff;border:1px solid var(--line);border-radius:18px;padding:16px;color:var(--muted)}
    @media(max-width:1050px){.layout,.grid-2,.grid-3,.grid-4,.kanban{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.actions{width:100%}.searchbar{flex-direction:column}}
  </style>
</head>
<body>
  <div id="app" class="page center"><div class="card login-card"><div class="small">SM SOLUCIONES</div><h1>SM OS</h1><p>Cargando sistema...</p></div></div>
<script>
(function(){
  const STORAGE_KEY = "sm_os_v6_roles_beta";
  const SESSION_KEY = "sm_os_v6_session";
  const app = document.getElementById("app");
  function uid(){return "id_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8)}
  function now(){return new Date().toISOString()} function today(){return new Date().toISOString().slice(0,10)}
  function plusDays(days){const d=new Date();d.setDate(d.getDate()+days);return d.toISOString().slice(0,10)}
  function esc(v){return String(v||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
  function norm(v){return String(v||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
  function byId(col,id){return col.find(x=>x.id===id)||null}

  const seed = {users:[],clients:[],projects:[],tasks:[],subtasks:[],comments:[],files:[],alerts:[]};
  const ids = {pako:uid(), nalleli:uid(), alan:uid(), tere:uid()};
  seed.users.push(
    {id:ids.pako,name:"Pako Ayala",username:"pako",pin:"1234",role:"admin",active:true,createdAt:now()},
    {id:ids.nalleli,name:"Nalleli Téllez",username:"nalleli",pin:"3333",role:"responsable",active:true,createdAt:now()},
    {id:ids.alan,name:"Alan",username:"alan",pin:"2222",role:"colaborador",active:true,createdAt:now()},
    {id:ids.tere,name:"Tere",username:"tere",pin:"4444",role:"consulta",active:true,createdAt:now()}
  );
  [["SM Soluciones","Cliente base para probar operación interna."],["MAVAS","Administración y estrategia comercial."],["StrongMax","Renta de cajas de seguridad."],["PRO KICKS","Proyecto deportivo y comercial."],["GPC","Grupo Profesionales en Contabilidad."]].forEach(c=>seed.clients.push({id:uid(),name:c[0],description:c[1],active:true,createdBy:ids.pako,createdAt:now()}));
  const cSM = seed.clients.find(c=>c.name==="SM Soluciones");
  const pWeb = {id:uid(),clientId:cSM.id,name:"Rediseño sitio web",description:"Proyecto creado por responsable dentro del cliente.",ownerId:ids.nalleli,status:"activo",priority:"alta",startDate:today(),dueDate:plusDays(20),createdBy:ids.nalleli,updatedAt:now(),createdAt:now()};
  seed.projects.push(pWeb);
  const task1 = {id:uid(),clientId:cSM.id,projectId:pWeb.id,title:"Diagnóstico del sitio actual",description:"Revisar home, formularios, navegación y versión móvil.",ownerId:ids.nalleli,createdBy:ids.nalleli,priority:"alta",status:"en_proceso",blocked:false,startDate:today(),dueDate:plusDays(3),updatedAt:now(),createdAt:now()};
  const task2 = {id:uid(),clientId:cSM.id,projectId:pWeb.id,title:"Revisión de textos del home",description:"Validar tono, claridad y CTA principal.",ownerId:ids.alan,createdBy:ids.nalleli,priority:"media",status:"pendiente",blocked:false,startDate:today(),dueDate:plusDays(1),updatedAt:now(),createdAt:now()};
  seed.tasks.push(task1,task2);
  seed.subtasks.push({id:uid(),taskId:task1.id,title:"Revisar versión móvil",ownerId:ids.nalleli,status:"pendiente",dueDate:plusDays(2),createdAt:now()});

  let state = loadState(); let session = loadSession(); let view="dashboard"; let selectedClientId=""; let selectedProjectId=""; let search="";
  function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY); if(!raw){localStorage.setItem(STORAGE_KEY,JSON.stringify(seed));return JSON.parse(JSON.stringify(seed))} const p=JSON.parse(raw); return {users:p.users||[],clients:p.clients||[],projects:p.projects||[],tasks:p.tasks||[],subtasks:p.subtasks||[],comments:p.comments||[],files:p.files||[],alerts:p.alerts||[]}}catch(e){localStorage.setItem(STORAGE_KEY,JSON.stringify(seed));return JSON.parse(JSON.stringify(seed))}}
  function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
  function loadSession(){try{const id=sessionStorage.getItem(SESSION_KEY);return id?{userId:id}:null}catch(e){return null}}
  function setSession(userId){sessionStorage.setItem(SESSION_KEY,userId);session={userId}}
  function clearSession(){sessionStorage.removeItem(SESSION_KEY);session=null}
  function currentUser(){return session?byId(state.users,session.userId):null}
  function roleLabel(r){return {admin:"Administrador",responsable:"Responsable",colaborador:"Colaborador",consulta:"Consulta"}[r]||r}
  function isAdmin(){const u=currentUser();return u&&u.role==="admin"} function isResp(){const u=currentUser();return u&&u.role==="responsable"} function isCollab(){const u=currentUser();return u&&u.role==="colaborador"} function isConsulta(){const u=currentUser();return u&&u.role==="consulta"}
  function canEdit(){return !isConsulta()} function canManageUsers(){return isAdmin()} function canManageClients(){return isAdmin()} function canCreateProject(){return isAdmin()||isResp()} function canDeleteProject(project){return isAdmin()} function canDeleteTask(task){const u=currentUser();return isAdmin()||(u&&task.createdBy===u.id)}
  function userName(id){const x=byId(state.users,id);return x?x.name:"Sin usuario"} function clientName(id){const x=byId(state.clients,id);return x?x.name:"Sin cliente"} function projectName(id){const x=byId(state.projects,id);return x?x.name:"Sin proyecto"}
  function daysUntil(date){if(!date)return 999;const a=new Date(),b=new Date(date+"T00:00:00");a.setHours(0,0,0,0);return Math.ceil((b-a)/86400000)}
  function statusText(s){return {pendiente:"Pendiente",en_proceso:"En proceso",en_revision:"En revisión",terminada:"Terminada",activo:"Activo",pausado:"Pausado",bloqueado:"Bloqueado",cerrado:"Cerrado"}[s]||s}
  function priorityText(s){return {baja:"Baja",media:"Media",alta:"Alta",critica:"Crítica"}[s]||s}
  function traffic(task){if(task.blocked)return "purple"; if(task.status==="terminada")return "green"; const d=daysUntil(task.dueDate); if(d<0)return "gray"; if(d<=1)return "red"; if(d<=3)return "yellow"; return "green"}
  function trafficText(c){return {green:"En tiempo",yellow:"Próxima",red:"Crítica",gray:"Vencida",purple:"Bloqueada"}[c]||c}
  function visibleClients(){return state.clients.slice()}
  function visibleProjects(){const u=currentUser();let list=state.projects.slice(); if(selectedClientId)list=list.filter(p=>p.clientId===selectedClientId); if(selectedProjectId)list=list.filter(p=>p.id===selectedProjectId); if(isCollab()){const pids=[...new Set(state.tasks.filter(t=>t.ownerId===u.id).map(t=>t.projectId))];list=list.filter(p=>pids.includes(p.id))} return list}
  function visibleTasks(){const u=currentUser();let list=state.tasks.slice(); if(selectedClientId)list=list.filter(t=>t.clientId===selectedClientId); if(selectedProjectId)list=list.filter(t=>t.projectId===selectedProjectId); if(isResp())list=list.filter(t=>{const p=byId(state.projects,t.projectId);return t.createdBy===u.id||t.ownerId===u.id||(p&&p.ownerId===u.id)}); if(isCollab())list=list.filter(t=>t.ownerId===u.id); if(search.trim()){const q=norm(search);list=list.filter(t=>norm(t.title).includes(q)||norm(t.description).includes(q)||norm(clientName(t.clientId)).includes(q)||norm(projectName(t.projectId)).includes(q)||norm(userName(t.ownerId)).includes(q))} return list}
  function visibleUsersForAssign(){return state.users.filter(u=>u.active&&u.role!=="consulta")}
  function projectProgress(projectId){const list=state.tasks.filter(t=>t.projectId===projectId); if(!list.length)return 0; return Math.round((list.filter(t=>t.status==="terminada").length/list.length)*100)}
  function projectLastMove(projectId){const dates=state.tasks.filter(t=>t.projectId===projectId).map(t=>t.updatedAt||t.createdAt).concat([(byId(state.projects,projectId)||{}).updatedAt||""]).filter(Boolean).sort(); return dates.length?dates[dates.length-1]:""}
  function scopedAlerts(){const alerts=[]; const u=currentUser(); const projects=visibleProjects(); const pids=projects.map(p=>p.id); const tasks=visibleTasks();
    projects.forEach(p=>{const tasksP=state.tasks.filter(t=>t.projectId===p.id); if(!tasksP.length)alerts.push({type:"Proyecto sin tareas",level:"red",text:clientName(p.clientId)+" · "+p.name+" no tiene tareas creadas.",projectId:p.id}); const last=projectLastMove(p.id); if(last && ((new Date()-new Date(last))/86400000)>7 && p.status!=="cerrado")alerts.push({type:"Proyecto sin movimiento",level:"yellow",text:p.name+" lleva más de 7 días sin actividad.",projectId:p.id})});
    tasks.forEach(t=>{if(t.blocked)alerts.push({type:"Bloqueo",level:"purple",text:t.title+" está bloqueada. "+(t.blockReason||""),taskId:t.id}); if(t.status!=="terminada"&&daysUntil(t.dueDate)<0)alerts.push({type:"Tarea vencida",level:"gray",text:t.title+" venció el "+(t.dueDate||"sin fecha")+".",taskId:t.id}); if(t.status!=="terminada"&&daysUntil(t.dueDate)<=1&&daysUntil(t.dueDate)>=0)alerts.push({type:"Vencimiento crítico",level:"red",text:t.title+" vence pronto.",taskId:t.id})});
    return alerts;
  }

  function render(){const u=currentUser(); if(!u){renderLogin();return} const active=selectedProjectId?projectName(selectedProjectId):(selectedClientId?clientName(selectedClientId):"Panel General"); app.className="page"; app.innerHTML=`
    <header class="card topbar"><div><div class="small">SM OS <span class="version">v6 roles beta local</span></div><h1 style="margin:4px 0 0;">${esc(active)}</h1><p style="margin:6px 0 0;color:var(--muted);">${esc(u.name)} · ${esc(roleLabel(u.role))}</p><span class="role-chip">Beta local: datos guardados en este navegador</span></div><div class="actions" style="margin-top:0;">${selectedProjectId?`<button class="btn-secondary" onclick="SM.clearProject()">Quitar proyecto</button>`:""}${selectedClientId?`<button class="btn-secondary" onclick="SM.clearClient()">Vista general</button>`:""}<button class="btn-secondary" onclick="SM.resetDemo()">Reiniciar demo</button><button class="btn-secondary" onclick="SM.logout()">Salir</button></div></header>
    <section class="layout"><aside class="card"><nav class="nav">${navButton("dashboard","Dashboard")}${navButton("clientes","Clientes")}${navButton("proyectos","Proyectos")}${navButton("tareas","Tareas")}${navButton("kanban","Kanban")}${navButton("calendario","Calendario")}${navButton("reportes","Reportes")}${canManageUsers()?navButton("usuarios","Usuarios"):""}</nav></aside><main id="content"></main></section>`; renderView()}
  function renderLogin(msg){app.className="page center"; app.innerHTML=`<form class="card login-card" id="loginForm"><div class="small">SM SOLUCIONES</div><h1 style="font-size:58px;">SM OS</h1><p style="color:var(--muted);font-size:18px;">Sistema Operativo de Gestión Interna</p><label>Usuario</label><input id="loginUser" value="pako"><label>PIN</label><input id="loginPin" type="password" value="1234">${msg?`<p style="color:var(--danger);font-weight:900;">${esc(msg)}</p>`:""}<br><br><button class="btn" type="submit" style="width:100%;">Entrar</button><p class="small" style="margin-top:18px;line-height:1.7;">Admin: pako / 1234<br>Responsable: nalleli / 3333<br>Colaborador: alan / 2222<br>Consulta: tere / 4444</p></form>`; document.getElementById("loginForm").addEventListener("submit",e=>{e.preventDefault();const username=document.getElementById("loginUser").value.trim();const pin=document.getElementById("loginPin").value.trim();const user=state.users.find(x=>x.username===username&&x.pin===pin&&x.active); if(!user){renderLogin("Usuario o PIN incorrecto.");return} setSession(user.id);render()})}
  function navButton(id,label){return `<button class="${view===id?"active":""}" onclick="SM.setView('${id}')">${label}</button>`}
  function renderView(){const c=document.getElementById("content"); if(!c)return; ({dashboard:renderDashboard,clientes:renderClients,proyectos:renderProjects,tareas:renderTasks,kanban:renderKanban,calendario:renderCalendar,reportes:renderReports,usuarios:renderUsers}[view]||renderDashboard)(c)}
  function stat(label,value){return `<div class="card stat"><div class="small">${esc(label)}</div><div class="num">${esc(value)}</div></div>`}
  function panel(title,actionLabel,action,body){return `<div class="card"><div class="row" style="margin-bottom:16px;"><h2 style="margin:0;">${esc(title)}</h2>${actionLabel?`<button class="btn" onclick="${action}">${esc(actionLabel)}</button>`:""}</div>${body}</div>`}
  function renderDashboard(c){const alerts=scopedAlerts(); const tasks=visibleTasks(); const projects=visibleProjects(); c.innerHTML=`<div class="grid"><div class="grid grid-4">${stat("Clientes",visibleClients().length)}${stat("Proyectos visibles",projects.length)}${stat("Tareas abiertas",tasks.filter(t=>t.status!=="terminada").length)}${stat("Alertas",alerts.length)}</div><div class="grid grid-2">${panel("Alertas accionables","","",alertCards(alerts.slice(0,8)))}${panel("Tareas prioritarias",canEdit()?"Nueva tarea":"","SM.openTaskModal()",taskCards(tasks.slice(0,6)))}${panel("Clientes",canManageClients()?"Nuevo cliente":"","SM.openClientModal()",clientCards())}${panel("Proyectos",canCreateProject()?"Nuevo proyecto":"","SM.openProjectModal()",projectCards(projects.slice(0,6)))}</div></div>`}
  function clientCards(){const list=visibleClients(); if(!list.length)return `<div class="empty">Sin clientes registrados.</div>`; return `<div class="list">${list.map(client=>`<div class="item row"><div><strong>${esc(client.name)}</strong><p style="margin:6px 0 0;color:var(--muted);">${esc(client.description)}</p><p class="small">${state.projects.filter(p=>p.clientId===client.id).length} proyectos</p></div><div class="actions" style="margin-top:0;"><button class="btn-secondary" onclick="SM.selectClient('${client.id}')">Abrir</button>${canCreateProject()?`<button class="btn-secondary" onclick="SM.openProjectModal('${client.id}')">Crear proyecto</button>`:""}</div></div>`).join("")}</div>`}
  function projectCards(list){if(!list.length)return `<div class="empty">Sin proyectos visibles.</div>`; return `<div class="list">${list.map(p=>`<div class="item"><div class="row"><div><span class="badge ${p.status==="bloqueado"?"purple":"green"}">${esc(statusText(p.status))}</span><div class="small" style="margin-top:8px;">${esc(clientName(p.clientId))} · Responsable: ${esc(userName(p.ownerId))}</div><h3 style="margin-top:8px;">${esc(p.name)}</h3><p style="margin:0;color:var(--muted);">${esc(p.description)} · Avance ${projectProgress(p.id)}%</p></div></div><div class="actions"><button class="btn-secondary" onclick="SM.selectProject('${p.id}')">Abrir operación</button>${canEdit()?`<button class="btn-secondary" onclick="SM.openTaskModal('${p.id}')">Nueva tarea</button>`:""}${isAdmin()||p.ownerId===(currentUser()||{}).id?`<button class="btn-secondary" onclick="SM.openEditProjectModal('${p.id}')">Editar</button>`:""}${canDeleteProject(p)?`<button class="btn-danger" onclick="SM.deleteRecord('projects','${p.id}')">Borrar</button>`:""}</div></div>`).join("")}</div>`}
  function alertCards(list){if(!list.length)return `<div class="empty">Sin alertas relevantes para tu rol.</div>`; return `<div class="list">${list.map(a=>`<div class="item"><span class="badge ${a.level}">${esc(a.type)}</span><p style="margin:8px 0 0;">${esc(a.text)}</p></div>`).join("")}</div>`}
  function taskCards(list){if(!list.length)return `<div class="empty">Sin tareas visibles.</div>`; return `<div class="list">${list.map(t=>taskCard(t)).join("")}</div>`}

    openEditUserModal(id){if(!canManageUsers())return alert("Solo admin puede editar usuarios.");const u=byId(state.users,id);if(!u)return;openModal("Editar usuario",`<form id="editUserForm" class="grid">${input("name","Nombre","text",u.name)}${input("username","Usuario","text",u.username)}${input("pin","PIN","text",u.pin)}${select("role","Rol",[["admin","Administrador"],["responsable","Responsable"],["colaborador","Colaborador"],["consulta","Consulta"]],u.role)}<button class="btn" type="submit">Guardar cambios</button></form>`);attach("editUserForm",d=>{if(!d.name||!d.username||!d.pin)return alert("Faltan datos del usuario.");if(state.users.some(x=>x.username===d.username&&x.id!==id))return alert("Ese usuario ya existe.");u.name=d.name;u.username=d.username;u.pin=d.pin;u.role=d.role;saveState();closeModal();render()})},
    updateTaskStatus(id,status){const t=byId(state.tasks,id);if(!t)return;t.status=status;if(status==="terminada"){t.blocked=false;t.blockReason=""}t.updatedAt=now();saveState();render()},updateSubtaskStatus(id,status,taskId){const s=byId(state.subtasks,id);if(s){s.status=status;saveState()}closeModal();SM.openTaskDetail(taskId)},deleteSubtask(id,taskId){if(!confirm("¿Borrar subtarea?"))return;state.subtasks=state.subtasks.filter(s=>s.id!==id);saveState();closeModal();SM.openTaskDetail(taskId)},
    deleteRecord(collection,id){if(!confirm("¿Borrar este registro?"))return; if(collection==="clients"){if(!canManageClients())return alert("Solo admin puede borrar clientes.");state.tasks=state.tasks.filter(t=>t.clientId!==id);state.projects=state.projects.filter(p=>p.clientId!==id);state.clients=state.clients.filter(c=>c.id!==id);if(selectedClientId===id){selectedClientId="";selectedProjectId=""}} if(collection==="projects"){const p=byId(state.projects,id);if(!p||!canDeleteProject(p))return alert("Solo admin puede borrar proyectos.");state.tasks=state.tasks.filter(t=>t.projectId!==id);state.projects=state.projects.filter(p=>p.id!==id);if(selectedProjectId===id)selectedProjectId=""} if(collection==="tasks"){const t=byId(state.tasks,id);if(!t||!canDeleteTask(t))return alert("No puedes borrar esta tarea.");state.subtasks=state.subtasks.filter(s=>s.taskId!==id);state.comments=state.comments.filter(c=>c.taskId!==id);state.files=state.files.filter(f=>f.taskId!==id);state.tasks=state.tasks.filter(t=>t.id!==id)} if(collection==="users"){if(!canManageUsers())return alert("Solo admin puede borrar usuarios.");const logged=currentUser();if(logged&&logged.id===id)return alert("No puedes borrar el usuario activo.");state.users=state.users.filter(u=>u.id!==id)} saveState();render()}
  };
  render();
})();
</script>
